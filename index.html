<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jin clobert</title>
<style>
  :root {
    --bg: #000000;
    --ink: #FFFFFF;
    --ink-dim: #6b6b6b;
    --ink-mute: #3a3a3a;
    --rule: #1c1c1c;
    --gothic: "Malgun Gothic", "Apple SD Gothic Neo", "Pretendard", -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--gothic);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    word-break: keep-all;
  }

  /* ---------- HOME VIEW ---------- */

  #home {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    transition: opacity 500ms ease, filter 500ms ease;
  }

  #home.leaving {
    opacity: 0;
    filter: blur(6px);
    pointer-events: none;
  }

  #logo-wrap {
    width: min(78vw, 460px);
  }
  #logo-wrap svg path {
    fill: none;
    stroke: var(--ink);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  #nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 11px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 700ms ease, transform 700ms ease;
  }
  #nav.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .project-link {
    font-size: 15px;
    letter-spacing: 0.14em;
    color: var(--ink);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 2px;
    font-family: var(--gothic);
    position: relative;
  }
  .project-link::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -6px;
    height: 1px;
    background: var(--ink);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 300ms ease;
  }
  .project-link:hover::after { transform: scaleX(1); }

  .project-link.muted {
    color: var(--ink-mute);
    cursor: default;
    letter-spacing: 0.14em;
  }
  .project-link.muted::after { display: none; }
  .project-link .tag {
    font-size: 10px;
    letter-spacing: 0.15em;
    margin-left: 10px;
    color: var(--ink-mute);
    vertical-align: middle;
  }

  /* ---------- ARCHIVE VIEW ---------- */

  #archive {
    position: fixed;
    inset: 0;
    overflow-y: auto;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
  }
  #archive.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #archive-header {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: linear-gradient(var(--bg) 60%, transparent);
  }
  #archive-header .mark {
    cursor: pointer;
    display: block;
    width: 118px;
  }
  #archive-header .mark svg { display: block; width: 100%; height: auto; }
  #archive-header .mark svg path { fill: #FFFFFF; }
  #archive-header .back {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    cursor: pointer;
    text-transform: uppercase;
    background: none;
    border: none;
    font-family: var(--gothic);
  }
  #archive-header .back:hover { color: var(--ink); }

  .quarter {
    max-width: 640px;
    margin: 0 auto;
    padding: 84px 24px 0;
  }
  .quarter:last-of-type { padding-bottom: 60px; }

  .quarter .index {
    font-size: 19px;
    letter-spacing: 0.12em;
    color: var(--ink-dim);
    margin-bottom: 26px;
  }
  .quarter .index .title {
    color: var(--ink);
    margin-left: 12px;
    letter-spacing: 0.02em;
  }

  .item-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 44px;
  }

  /* The [Light Up] reveal — sits between 4분기 and 5분기, not numbered */
  .quarter.feature {
    padding-top: 100px;
  }
  .quarter.feature .index {
    text-align: center;
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--ink);
    margin-bottom: 30px;
  }
  /* The opening [Light Up] (intro/self-interview) gets extra breathing room
     before the video — roughly 2.5x the usual gap. */
  .quarter.feature:first-child .index {
    margin-bottom: 75px;
  }

  .frame {
    border-radius: 2px;
    background:
      linear-gradient(160deg, #141414, #060606 65%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-mute);
    font-size: 11px;
    letter-spacing: 0.1em;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .frame iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  .mute-toggle {
    position: absolute;
    z-index: 2;
    bottom: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(2px);
    color: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .mute-toggle svg { width: 17px; height: 17px; }
  .mute-toggle .icon-unmuted { display: none; }
  .mute-toggle.is-unmuted .icon-muted { display: none; }
  .mute-toggle.is-unmuted .icon-unmuted { display: block; }
  /* Stills — native ratios mixed across the set, sized to viewport height so
     each photo/video reads as near-fullscreen on mobile, not a small tile. */
  .frame.r-3-4 { aspect-ratio: 3 / 4; height: 70vh; max-width: 92%; }
  .frame.r-1-1 { aspect-ratio: 1 / 1; height: 62vh; max-width: 92%; }
  .frame.r-4-5 { aspect-ratio: 4 / 5; height: 72vh; max-width: 92%; }
  /* Motion — landscape clips run wide and short, vertical clips run narrow and tall */
  .frame.r-16-9 { aspect-ratio: 16 / 9; width: 100%; }
  .frame.r-9-16 { aspect-ratio: 9 / 16; height: 78vh; max-width: 92%; }

  /* Swipeable sub-set: e.g. 3_4_1/2/3, a single flowing sequence of frames.
     Each frame lives in its own full-width "page" so it sits dead-center at
     rest — the next photo only appears once the reader actually swipes. */
  .swipe-set {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    margin: 0 -24px;
    scrollbar-width: none;
  }
  .swipe-set::-webkit-scrollbar { display: none; }
  .swipe-page {
    flex: 0 0 100%;
    box-sizing: border-box;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: center;
    scroll-snap-stop: always;
  }
  .swipe-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 12px;
  }
  .swipe-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--ink-mute);
  }

  .item-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--ink-dim);
    margin-bottom: 14px;
    text-align: center;
  }

  .caption {
    margin-bottom: 18px;
    font-size: 14px;
    line-height: 1.8;
    color: #d8d8d8;
    font-weight: 300;
    text-align: center;
    max-width: 480px;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .caption-line { }

  /* Treatment B — a deliberate pause before the direct-address line inside 4분기.
     Same words, more room to breathe, so the shift in tone is signalled
     before the reader arrives at it, rather than landing abruptly. */
  .item-block.beat {
    padding: 46px 0 10px;
  }
  .item-block.beat .caption {
    display: flex;
    flex-direction: column;
    gap: 20px;
    font-size: 15px;
    letter-spacing: 0.01em;
    color: var(--ink);
  }

  #signature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
    padding: 120px 24px 100px;
    opacity: 0;
    transition: opacity 900ms ease;
  }
  #signature.visible { opacity: 1; }
  .sig-mark {
    width: 150px;
  }
  .sig-mark svg { display: block; width: 100%; height: auto; }
  .sig-mark svg path { fill: #FFFFFF; }

  .social-icons {
    display: flex;
    gap: 26px;
  }
  .social-icons a {
    color: var(--ink-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    margin: -10px;
    transition: color 220ms ease;
  }
  .social-icons a:hover { color: var(--ink); }
  .social-icons svg {
    width: 20px;
    height: 20px;
    pointer-events: none;
  }
  .linktree-mark { pointer-events: none; }

  document.getElementById('header-mark').innerHTML = STATIC_MARK_SVG;

  const stage = { home: document.getElementById('home'), archive: document.getElementById('archive') };
  const nav = document.getElementById('nav');
  const quartersEl = document.getElementById('quarters');
  const signatureEl = document.getElementById('signature');

  // ---- Draw-in (same technique as the logo demo) ----
  function playDrawIn() {
    const paths = Array.from(document.querySelectorAll('#logo-wrap path'));
    const ordered = paths.map(p => ({ el: p, x: p.getBBox().x })).sort((a, b) => a.x - b.x);
    const n = ordered.length;
    const TOTAL = 1500, PORTION = 0.72;

    ordered.forEach(({ el }, i) => {
      const len = el.getTotalLength();
      el.style.fill = 'none';
      el.style.strokeDasharray = len;
      el.style.strokeDashoffset = len;
      el.style.opacity = '1';
      const dur = TOTAL * PORTION * 0.55;
      const start = (TOTAL * (1 - PORTION)) * (i / Math.max(n - 1, 1));
      requestAnimationFrame(() => {
        el.style.transition = `stroke-dashoffset ${dur}ms cubic-bezier(0.45,0.05,0.35,1) ${start}ms`;
        el.style.strokeDashoffset = '0';
      });
    });

    setTimeout(() => {
      ordered.forEach(({ el }) => {
        el.style.transition = 'fill 320ms ease-out, stroke-width 320ms ease-out';
        el.style.fill = '#FFFFFF';
        el.style.strokeWidth = '0';
      });
      nav.classList.add('visible');
    }, TOTAL + 60);
  }

  document.querySelectorAll('#logo-wrap path').forEach(p => p.style.opacity = '0');
  window.addEventListener('load', () => setTimeout(playDrawIn, 250));

  // ---- Archive open/close ----
  function captionHtml(caption) {
    if (!caption) return '';
    const lines = caption.split('\n').map(l => `<div class="caption-line">${l}</div>`).join('');
    return `<div class="caption">${lines}</div>`;
  }

  function renderItem(item) {
    const blockClass = item.beat ? 'item-block beat' : 'item-block';
    const subtitle = item.subtitle ? `<div class="subtitle">${item.subtitle}</div>` : '';

    function mediaHtml(ratio, { file, yt } = {}) {
      if (yt) {
        const src = `https://www.youtube.com/embed/${yt}?mute=1&loop=1&playlist=${yt}&controls=0&rel=0&modestbranding=1&playsinline=1&enablejsapi=1&iv_load_policy=3&cc_load_policy=0&disablekb=1&fs=0`;
        return `
          <div class="frame r-${ratio}">
            <iframe id="yt-${yt}" class="yt-frame" src="${src}" title="" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            <button class="mute-toggle" data-yt-id="yt-${yt}" aria-label="소리 켜기/끄기">
              <svg class="icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 9v6h4l5 5V4L8 9H4z"/>
                <line x1="16" y1="9" x2="21" y2="14"/>
                <line x1="21" y1="9" x2="16" y2="14"/>
              </svg>
              <svg class="icon-unmuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 9v6h4l5 5V4L8 9H4z"/>
                <path d="M16.5 8.5a5 5 0 0 1 0 7"/>
                <path d="M19 6a8.5 8.5 0 0 1 0 12"/>
              </svg>
            </button>
          </div>`;
      }
      if (file) {
        return `<div class="frame r-${ratio}"><img src="${file}" alt="" loading="lazy"></div>`;
      }
      return `<div class="frame r-${ratio}">비어있음</div>`; // no source yet — shows as empty placeholder
    }

    if (item.type === "group") {
      const dots = Array.from({ length: item.count }).map(() => '<span></span>').join('');
      const frames = Array.from({ length: item.count })
        .map((_, i) => `<div class="swipe-page">${mediaHtml(item.ratio, { file: item.files ? item.files[i] : null })}</div>`)
        .join('');
      return `
        <div class="${blockClass}">
          ${subtitle}
          ${captionHtml(item.caption)}
          <div class="swipe-set">${frames}</div>
          <div class="swipe-dots">${dots}</div>
        </div>`;
    }
    return `
      <div class="${blockClass}">
        ${subtitle}
        ${captionHtml(item.caption)}
        ${mediaHtml(item.ratio, { file: item.file, yt: item.yt })}
      </div>`;
  }

  function buildQuarters(data) {
    quartersEl.innerHTML = data.map(q => {
      if (q.feature) {
        return `
          <div class="quarter feature">
            <div class="index">${q.feature}</div>
            <div class="item-stack">
              ${q.items.map(renderItem).join('')}
            </div>
          </div>`;
      }
      return `
        <div class="quarter">
          <div class="index">${q.index}<span class="title">${q.title}</span></div>
          <div class="item-stack">
            ${q.items.map(renderItem).join('')}
          </div>
        </div>`;
    }).join('');
  }

  function openArchive(project) {
    if (project === 'lightup') buildQuarters(LIGHT_UP_QUARTERS);
    stage.home.classList.add('leaving');
    signatureEl.classList.remove('visible');
    setTimeout(() => {
      stage.archive.classList.add('visible');
      stage.archive.scrollTo(0, 0);
    }, 350);
    initYoutubePlayers();
  }

  function closeArchive() {
    stage.archive.classList.remove('visible');
    stage.home.classList.remove('leaving');
  }

  // Reveal the quiet signature only once the reader nears the end
  stage.archive.addEventListener('scroll', () => {
    const el = stage.archive;
    const nearBottom = el.scrollTop + el.clientHeight > el.scrollHeight - 200;
    if (nearBottom) signatureEl.classList.add('visible');
  });

  // ---- YouTube players: muted autoplay by default, tap to unmute ----
  let ytApiReady = false;
  let pendingYtIds = [];
  const ytPlayers = {};
  let ytObserver = null;

  window.onYouTubeIframeAPIReady = function () {
    ytApiReady = true;
    pendingYtIds.forEach(createYtPlayer);
    pendingYtIds = [];
  };

  function createYtPlayer(id) {
    if (!document.getElementById(id) || ytPlayers[id]) return;
    ytPlayers[id] = new YT.Player(id, {
      events: {
        // Once the player is actually ready, re-check whether it's already
        // sitting in view (the observer only fires on a visibility change,
        // so a player that finishes loading mid-view needs a manual nudge).
        onReady: () => {
          const el = document.getElementById(id);
          if (el && ytObserver) {
            ytObserver.unobserve(el);
            ytObserver.observe(el);
          }
        },
      },
    });
  }

  function observeYoutubeFrames() {
    if (!ytObserver) {
      ytObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            const iframe = entry.target;
            const player = ytPlayers[iframe.id];
            if (!player || typeof player.playVideo !== 'function') return;
            if (entry.isIntersecting) {
              player.playVideo();
            } else {
              player.pauseVideo();
              // Reset to muted so it doesn't surprise-play with sound next time.
              if (typeof player.mute === 'function') player.mute();
              const btn = document.querySelector(`.mute-toggle[data-yt-id="${iframe.id}"]`);
              if (btn) btn.classList.remove('is-unmuted');
            }
          });
        },
        { threshold: 0.5 } // fires once roughly half the clip is on screen
      );
    }
    document.querySelectorAll('.yt-frame').forEach((iframe) => ytObserver.observe(iframe));
  }

  function initYoutubePlayers() {
    document.querySelectorAll('.yt-frame').forEach((iframe) => {
      if (ytApiReady) {
        createYtPlayer(iframe.id);
      } else if (!pendingYtIds.includes(iframe.id)) {
        pendingYtIds.push(iframe.id);
      }
    });
    observeYoutubeFrames();
  }

  // Load the IFrame API script once, up front
  (function loadYoutubeApi() {
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();

  quartersEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.mute-toggle');
    if (!btn) return;
    const player = ytPlayers[btn.dataset.ytId];
    if (!player || typeof player.isMuted !== 'function') return;

    if (player.isMuted()) {
      // Only one clip plays with sound at a time — mute any others first.
      document.querySelectorAll('.mute-toggle.is-unmuted').forEach((other) => {
        if (other === btn) return;
        const otherPlayer = ytPlayers[other.dataset.ytId];
        if (otherPlayer && otherPlayer.mute) otherPlayer.mute();
        other.classList.remove('is-unmuted');
      });
      player.unMute();
      btn.classList.add('is-unmuted');
    } else {
      player.mute();
      btn.classList.remove('is-unmuted');
    }
  });
</script>
